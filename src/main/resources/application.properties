spring.application.name=Hospital_Management_System


# Data Source Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hms
spring.datasource.username=root
spring.datasource.password=jash27

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Jackson Configuration
spring.jackson.time-zone=UTC

# SQL Initialization
spring.sql.init.mode=never

# Server Configuration
server.port=8087

# Custom App JWT Configuration
app.jwt.secret=HospitalManagementSystemSecretKeyForJWTTokenSigning2026
app.jwt.expiration-ms=86400000

# Custom App Admin Configuration
app.admin.username=admin
app.admin.email=admin@hospital.com
app.admin.password=Admin@123